name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autopilotops
          POSTGRES_PASSWORD: autopilotops
          POSTGRES_DB: autopilotops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://autopilotops:autopilotops@localhost:5432/autopilotops?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      JWT_PREVIOUS_SECRETS: ''
      COOKIE_SECRET: ci-cookie-secret-ci-cookie-secret-32
      JWT_ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      API_PORT: 4040
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4040
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/prisma
            node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}
          restore-keys: |
            prisma-${{ runner.os }}-
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npm run build
