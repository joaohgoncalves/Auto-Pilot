services:
  postgres:
    image: postgres:16-alpine
    container_name: autopilotops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopilotops
      POSTGRES_PASSWORD: autopilotops
      POSTGRES_DB: autopilotops
    ports:
      - "5432:5432"
    volumes:
      - autopilotops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilotops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autopilotops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autopilotops-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://autopilotops:autopilotops@postgres:5432/autopilotops?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "4040:4040"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy && node apps/api/dist/server.js"]

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autopilotops-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://autopilotops:autopilotops@postgres:5432/autopilotops?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["node", "apps/api/dist/worker.js"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4040
    container_name: autopilotops-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4040
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  autopilotops_postgres:
