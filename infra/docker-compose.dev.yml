services:
  postgres:
    image: postgres:16-alpine
    container_name: autopilotops-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopilotops
      POSTGRES_PASSWORD: autopilotops
      POSTGRES_DB: autopilotops
    ports:
      - "5432:5432"
    volumes:
      - autopilotops_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilotops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autopilotops-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  autopilotops_postgres_dev:
