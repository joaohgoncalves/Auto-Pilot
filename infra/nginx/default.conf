upstream autopilotops_api {
  server api:4040;
}

upstream autopilotops_web {
  server web:3000;
}

server {
  listen 80;
  server_name _;

  location /health/live {
    proxy_pass http://autopilotops_api/health/live;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://autopilotops_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location / {
    proxy_pass http://autopilotops_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }
}
